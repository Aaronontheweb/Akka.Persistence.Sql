parameters:
  name: ''
  displayName: ''
  vmImage: ''
  outputDirectory: ''
  artifactName: ''
  timeoutInMinutes: 120

jobs:
  - job: ${{ parameters.name }}
    displayName: ${{ parameters.displayName }}
    timeoutInMinutes: ${{ parameters.timeoutInMinutes }}

    pool:
      vmImage: ${{ parameters.vmImage }}

    steps:
      - checkout: self  # self represents the repo where the initial Pipelines YAML file was found
        clean: false  # whether to fetch clean each time
        submodules: recursive  # set to 'true' for a single level of submodules or 'recursive' to get submodules of submodules
        persistCredentials: true

      - task: UseDotNet@2
        displayName: 'Use .NET'
        inputs:
          packageType: 'sdk'
          useGlobalJson: true
          
      - pwsh: |
          .\build.ps1
        displayName: 'Update Release Notes'
        continueOnError: false

      - task: DotNetCoreCLI@2
        displayName: Build
        inputs:
          command: 'build'
          arguments: '-c Release'
        continueOnError: false

      # Linux or macOS - clean up Docker to free disk space before tests
      - script: |
          docker system prune -af --volumes
          df -h /
        displayName: 'Clean Docker cache (Linux)'
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )
        continueOnError: true

      # Azure hosted runners have limited disk space (~14GB) and the Docker images for
      # SQL Server, PostgreSQL, and MySQL total ~3GB. Running all tests together exhausts
      # disk space, so we run each database type separately with cleanup between.
      # SQLite tests first (no Docker needed)
      - task: DotNetCoreCLI@2
        displayName: 'Linux Tests - SQLite'
        inputs:
          command: 'test'
          publishTestResults: true
          arguments: '--no-build -c Release --filter "FullyQualifiedName~Sqlite"'
          projects: |
            **/*.Tests.csproj
            !**/*.Benchmark.*.csproj
            !**/Examples/**/*.csproj
        continueOnError: true
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )

      # SQL Server tests
      - task: DotNetCoreCLI@2
        displayName: 'Linux Tests - SQL Server'
        inputs:
          command: 'test'
          publishTestResults: true
          arguments: '--no-build -c Release --filter "FullyQualifiedName~SqlServer"'
          projects: |
            **/*.Tests.csproj
            !**/*.Benchmark.*.csproj
            !**/Examples/**/*.csproj
        continueOnError: true
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )

      # Clean up SQL Server Docker resources
      - script: |
          docker system prune -af --volumes
          df -h /
        displayName: 'Clean Docker after SQL Server tests'
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )
        continueOnError: true

      # PostgreSQL tests
      - task: DotNetCoreCLI@2
        displayName: 'Linux Tests - PostgreSQL'
        inputs:
          command: 'test'
          publishTestResults: true
          arguments: '--no-build -c Release --filter "FullyQualifiedName~PostgreSql"'
          projects: |
            **/*.Tests.csproj
            !**/*.Benchmark.*.csproj
            !**/Examples/**/*.csproj
        continueOnError: true
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )

      # Clean up PostgreSQL Docker resources
      - script: |
          docker system prune -af --volumes
          df -h /
        displayName: 'Clean Docker after PostgreSQL tests'
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )
        continueOnError: true

      # MySQL tests
      - task: DotNetCoreCLI@2
        displayName: 'Linux Tests - MySQL'
        inputs:
          command: 'test'
          publishTestResults: true
          arguments: '--no-build -c Release --filter "FullyQualifiedName~MySql"'
          projects: |
            **/*.Tests.csproj
            !**/*.Benchmark.*.csproj
            !**/Examples/**/*.csproj
        continueOnError: true
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )

      # Clean up MySQL Docker resources
      - script: |
          docker system prune -af --volumes
          df -h /
        displayName: 'Clean Docker after MySQL tests'
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )
        continueOnError: true

      # Run any remaining tests (DDL validation, etc.) that don't match the above filters
      - task: DotNetCoreCLI@2
        displayName: 'Linux Tests - Other'
        inputs:
          command: 'test'
          publishTestResults: true
          arguments: '--no-build -c Release --filter "FullyQualifiedName!~Sqlite&FullyQualifiedName!~SqlServer&FullyQualifiedName!~PostgreSql&FullyQualifiedName!~MySql"'
          projects: |
            **/*.Tests.csproj
            !**/*.Benchmark.*.csproj
            !**/Examples/**/*.csproj
        continueOnError: true
        condition: in( variables['Agent.OS'], 'Linux', 'Darwin' )

      # Windows
      - task: DotNetCoreCLI@2
        displayName: Windows Unit Tests
        inputs:
          command: 'test'
          publishTestResults: true
          arguments: '--no-build -c Release'
          projects: |
            **/*.Tests.csproj
            !**/*.Data.Compatibility.Tests.csproj
            !**/*.Benchmark.*.csproj
            !**/Examples/**/*.csproj
        continueOnError: true
        condition: eq( variables['Agent.OS'], 'Windows_NT' )

      - task: DotNetCoreCLI@2
        displayName: NuGet pack
        inputs:
          command: 'pack'
          includeSymbols: true
          arguments: '--no-build -c Release'
          packDirectory: ${{ parameters.outputDirectory }}
        continueOnError: true
        condition: eq( variables['Agent.OS'], 'Windows_NT' )

      - task: CopyFiles@2
        displayName: 'Copy Build Output'
        inputs:
          SourceFolder: ${{ parameters.outputDirectory }}
          Contents: '**/*'
          TargetFolder: $(Build.ArtifactStagingDirectory)
        condition: eq( variables['Agent.OS'], 'Windows_NT' )
      # End Windows

      - task: PublishTestResults@2
        inputs:
          testResultsFormat: VSTest
          testResultsFiles: '**/*.trx' #TestResults folder usually
          testRunTitle: ${{ parameters.name }}
          mergeTestResults: true
          failTaskOnFailedTests: false
          publishRunAttachments: true

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: ${{ parameters.artifactName }}

      - script: 'echo 1>&2'
        failOnStderr: true
        displayName: 'If above is partially succeeded, then fail'
        condition: eq(variables['Agent.JobStatus'], 'SucceededWithIssues')
